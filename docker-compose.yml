version: '3.8'

services:

  # ─── PHP / Laravel ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - saas_net
    depends_on:
      - mysql
      - redis

  # ─── Nginx ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saas_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - saas_net
    depends_on:
      - app

  # ─── MySQL 8 ─────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saas_pm
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: saas_user
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - saas_net

  # ─── Redis ───────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - saas_net

  # ─── Queue Worker ─────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3
    volumes:
      - ./src:/var/www
    networks:
      - saas_net
    depends_on:
      - redis
      - mysql

networks:
  saas_net:
    driver: bridge

volumes:
  mysql_data: